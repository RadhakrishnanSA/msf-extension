AllCops:
  NewCops: enable
  Exclude:
    - 'vendor/**/*'
    - 'spec/**/*'
    - 'test/**/*'

Metrics/MethodLength:
  Max: 100
Metrics/AbcSize:
  Max: 100
Metrics/CyclomaticComplexity:
  Max: 30
Metrics/PerceivedComplexity:
  Max: 30
Metrics/ClassLength:
  Max: 700
Metrics/BlockLength:
  Max: 50
Metrics/ParameterLists:
  Max: 6
Metrics/BlockNesting:
  Max: 4

Layout/LineLength:
  Max: 150

Layout/EndOfLine:
  Enabled: false

Layout/EmptyLines:
  Enabled: false

Naming/PredicateMethod:
  Enabled: false
