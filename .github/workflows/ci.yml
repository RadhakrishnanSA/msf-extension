name: MME CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1'
      - run: gem install rubocop
      - run: rubocop --format github lib/ spec/

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1'
      - run: gem install rspec
      - run: rspec spec/

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: [lint, test]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Create release archive
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          tar czf mme-${VERSION}.tar.gz \
            --exclude='.git' --exclude='spec' \
            --exclude='.github' .
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: mme-*.tar.gz
          generate_release_notes: true
